[project]
name = "dana-common"
version = "0.1.0"
description = "Dana AI Platform - Shared library"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "redis>=5.0",
    "aio-pika>=9.0",
    "cryptography>=42.0",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
