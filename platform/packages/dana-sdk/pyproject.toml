[project]
name = "dana-sdk"
version = "0.1.0"
description = "Dana AI Platform - Python SDK (OpenAI-compatible)"
requires-python = ">=3.9"
dependencies = [
    "httpx>=0.27",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
